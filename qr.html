  <style>
    :root {
      --blue: #0878df;
      --deep: #24303c;
      --silver: #c7c9cc;
      --text: #25313c;
      --muted: #707a84;
      --line: rgba(36,48,60,.13);
      --paper: #f7f9fb;
      --white: #fff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, #f5f8fb 55%, #eef3f8 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .page {
      width: 100%;
      max-width: 430px;
    }

    .card {
      width: 100%;
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 22px 22px;
      box-shadow: 0 22px 70px rgba(36,48,60,.12);
    }

    .logo-wrap {
      width: 112px;
      height: 112px;
      margin: 0 auto 18px;
      border-radius: 28px;
      background: #fff;
      border: 1px solid rgba(8,120,223,.16);
      box-shadow: 0 16px 36px rgba(36,48,60,.09);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 7px;
    }

    .tag {
      margin: 0 0 6px;
      text-align: center;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--blue);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 31px;
      line-height: 1;
      letter-spacing: .28em;
      color: var(--deep);
      font-weight: 600;
      transform: translateX(.14em);
    }

    .quote {
      margin: 15px auto 24px;
      max-width: 310px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .links {
      display: grid;
      gap: 10px;
    }

    .link {
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--deep);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: .01em;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .link:active { transform: scale(.985); }
    .link:hover {
      transform: translateY(-2px);
      background: #fff;
      border-color: rgba(8,120,223,.35);
      box-shadow: 0 14px 30px rgba(36,48,60,.08);
    }

    .link.main {
      background: linear-gradient(135deg, var(--deep), #1b2632);
      color: #fff;
      border-color: transparent;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #fff;
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      border: 1px solid rgba(36,48,60,.09);
    }

    .link.main .icon { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.18); }
    .icon svg { width: 18px; height: 18px; fill: var(--blue); display: block; }
    .link.main svg { fill: #fff; }

    .foot {
      margin-top: 18px;
      padding-top: 17px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 380px) {
      body { padding: 14px; }
      .card { border-radius: 22px; padding: 23px 16px 18px; }
      .logo-wrap { width: 96px; height: 96px; border-radius: 23px; }
      h1 { font-size: 25px; letter-spacing: .24em; }
      .quote { font-size: 14px; margin-bottom: 20px; }
      .link { min-height: 52px; font-size: 15px; }
    }
  </style>
</head>
